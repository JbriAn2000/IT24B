<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
</head>
<body>
    <h1>Index</h1>
    <h1><a href="basic-events.html">1. Basic Events</a></h1>
     <h1><a href="todolist.html">2. To do list</a></h1>
       <input type="text"
           id="taskInput"
           placeholder="Add a task..."
    />
    <button onclick="addTask()">Add</button>

    <ul id="taskList">Tasks goes here</ul>

<script>

    function addTask(){
        const taskText = getTaskText();
           if (taskText){
            addTaskItem(taskText);
        } else{
            console.log("No task entered");
        }
    }

    function getTaskText(){
        const input = document.getElementById("taskInput");
        const value = input.value.trim();
        console.log("getTaskText() called -> ",value);
        return value;
    }
      function addTaskItem(taskText){
        const li = document.createElement("li");
        li.textContent = taskText;

        document.getElementById("taskList").appendChild(li);
        console.log("addTaskItem() called -> ",taskText,Date());
    }


</script>
</body>
</html>
